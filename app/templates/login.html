{% extends "base.html" %}
{% block title %}Accedi{% endblock %}
{% block content %}
<div class="card auth-card">
  <svg class="auth-emblem" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#10233b">
    <path d="M24 4 L42 10 V22 C42 34 34 42 24 46 C14 42 6 34 6 22 V10 Z" stroke="currentColor" stroke-width="2"/>
    <path d="M24 15 V31 M16 23 H32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <span class="eyebrow" style="text-align:center">Area riservata</span>
  <h1>Accedi</h1>
  <form method="post">
    <label>Utente
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="btn btn-primary">Entra</button>
  </form>
</div>
{% endblock %}
