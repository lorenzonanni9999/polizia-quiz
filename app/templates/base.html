<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Simulatore Quiz Polizia{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ url_for('dashboard.home') if g.user else url_for('auth.login') }}">Simulatore Concorso Polizia</a>
  {% if g.user %}
  <nav class="topnav">
    <a href="{{ url_for('dashboard.home') }}">Dashboard</a>
    <a href="{{ url_for('practice.form') }}">Allenamento</a>
    <a href="{{ url_for('dashboard.settings') }}">Impostazioni</a>
    <a href="{{ url_for('auth.account') }}">Account</a>
    <a href="{{ url_for('auth.logout') }}">Esci</a>
  </nav>
  {% endif %}
</header>

<main class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-list">
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>
</body>
</html>
