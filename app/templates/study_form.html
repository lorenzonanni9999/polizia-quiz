{% extends "base.html" %}
{% block title %}Modalità studio{% endblock %}
{% block content %}

<div class="card">
  <a href="{{ url_for('practice.hub') }}" class="muted">&larr; Modalità di allenamento</a>
  <h1>Modalità studio</h1>
  <p class="muted">Una domanda alla volta, senza timer: dopo ogni risposta vedi subito se è corretta.</p>

  <form method="post" action="{{ url_for('practice.new_study') }}" class="practice-form">
    <label>Materia
      <select name="subject" id="subject-select">
        {% for s in subjects %}
        <option value="{{ s.subject }}" data-available="{{ s.available }}">{{ s.subject }} ({{ s.available }} disponibili)</option>
        {% endfor %}
      </select>
    </label>

    <label>Numero di domande
      <input type="number" name="count" id="count-input" min="1" value="10" required>
    </label>
    <p class="muted" id="available-hint"></p>

    <button type="submit" class="btn btn-primary">Avvia studio</button>
  </form>
</div>

<script>
const select = document.getElementById('subject-select');
const countInput = document.getElementById('count-input');
const hint = document.getElementById('available-hint');

function syncMax() {
  const opt = select.options[select.selectedIndex];
  const available = parseInt(opt.dataset.available, 10);
  countInput.max = available;
  if (parseInt(countInput.value, 10) > available) {
    countInput.value = available;
  }
  hint.textContent = 'Massimo disponibile per questa materia: ' + available;
}
select.addEventListener('change', syncMax);
syncMax();
</script>

{% endblock %}
